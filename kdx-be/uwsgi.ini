[uwsgi]

project=kdx-be
base=/home

chdir=%(base)/%(project)
pythonpath=%(base)/%(project)

# 设置 Django 环境变量
env=DJANGO_SETTINGS_MODULE=kdemo.settings
env=PYTHONPATH=%(base)/%(project)

module=kdemo.wsgi:application
master=True
processes=1
threads = 2

http = 0.0.0.0:8000
vacuum=True
max-requests=5000
pidfile=/tmp/%(project)-master.pid

# 日志配置：写入文件
daemonize=/home/kdx-be/logs/uwsgi.log
logformat = uwsgi log: %(method) %(uri) %(proto) %(ctime) returning with status %(status)
logdate = true

# 设置请求超时时间
harakiri = 60

# 请求体大小限制
post-buffering=65536
buffer-size=65535
limit-post=104857600

# 启用详细日志
harakiri-verbose = true
memory-report = true

# 平滑重启配置
reload-mercy = 10
reload-on-as = 1024