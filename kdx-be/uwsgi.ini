[uwsgi]

project=kdx-be
base=/home

chdir=%(base)/%(project)
module=kdemo.wsgi:application
master=True
processes=1
threads = 2

http = 0.0.0.0:8000
vacuum=True
max-requests=5000
pidfile=/tmp/%(project)-master.pid

# 使用 stdout 输出日志（适合 Docker 环境）
logto=/dev/stdout
logformat = uwsgi log: %(method) %(uri) %(proto) %(ctime) returning with status %(status)
logdate = true

# 设置请求超时时间
harakiri = 60

# 请求体大小限制
post-buffering=65536
buffer-size=65535
limit-post=104857600

# 启用详细日志
harakiri-verbose = true
memory-report = true

# 平滑重启配置
reload-mercy = 10
reload-on-as = 1024