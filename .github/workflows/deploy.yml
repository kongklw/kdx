name: Smart Deploy

on:
  push:
    branches: [main]

env:
  SSH_HOST: ${{ secrets.SSH_HOST }}
  SSH_USER: ${{ secrets.SSH_USER }}
  SSH_KEY: ${{ secrets.SSH_KEY }}
  PROJECT_PATH: /root/kdx

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      changed_modules: ${{ steps.detect.outputs.changed_modules }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed modules
        id: detect
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"

          MODULES=""

          # 检测后端变更
          if echo "$CHANGED_FILES" | grep -qE "^kdx-be/"; then
            MODULES="$MODULES backend,"
          fi

          # 检测前端变更
          if echo "$CHANGED_FILES" | grep -qE "^kdx-fe/"; then
            MODULES="$MODULES frontend,"
          fi

          # 检测 WebSocket 后端变更
          if echo "$CHANGED_FILES" | grep -qE "^kdx-ws-be/"; then
            MODULES="$MODULES fastapi,"
          fi

          # 检测配置变更（影响所有服务）
          if echo "$CHANGED_FILES" | grep -qE "^compose/|^docker-compose\.yaml"; then
            MODULES="$MODULES nginx,"
          fi

          # 移除末尾逗号
          MODULES=$(echo "$MODULES" | sed 's/,$//')

          # 如果没有检测到具体模块变更，默认部署所有
          if [ -z "$MODULES" ]; then
            MODULES="backend,frontend,fastapi,nginx"
          fi

          echo "Changed modules: $MODULES"
          echo "changed_modules=$MODULES" >> $GITHUB_OUTPUT

  deploy:
    needs: detect-changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_KEY }}
          script: |
            set -e
            cd ${{ env.PROJECT_PATH }}

            echo "=== 拉取最新代码 ==="
            git pull origin main

            # 修复 BOM 头问题
            sed -i '1s/^\xEF\xBB\xBF//' start.sh
            chmod +x start.sh

            MODULES="${{ needs.detect-changes.outputs.changed_modules }}"
            echo "需要部署的模块: $MODULES"

            # 部署后端
            if echo "$MODULES" | grep -q "backend"; then
              echo "=== 部署后端 (kdx-be) ==="
              ./start.sh backend
            fi

            # 部署前端
            if echo "$MODULES" | grep -q "frontend"; then
              echo "=== 部署前端 (kdx-fe) ==="
              ./start.sh frontend
            fi

            # 部署 FastAPI
            if echo "$MODULES" | grep -q "fastapi"; then
              echo "=== 部署 WebSocket 后端 (kdx-ws-be) ==="
              ./start.sh fastapi
            fi

            # 部署 Nginx
            if echo "$MODULES" | grep -q "nginx"; then
              echo "=== 部署 Nginx ==="
              ./start.sh nginx
            fi

            echo "=== 部署完成，服务状态 ==="
            docker-compose ps
