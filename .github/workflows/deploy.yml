name: Smart Build and Deploy to ACR

on:
  push:
    branches: [main]

env:
  SSH_HOST: ${{ secrets.SSH_HOST }}
  SSH_USER: ${{ secrets.SSH_USER }}
  SSH_KEY: ${{ secrets.SSH_KEY }}
  PROJECT_PATH: /root/kdx
  DOCKER_BUILDKIT: 1
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
  ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
  ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
  ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend_changed: ${{ steps.detect.outputs.frontend_changed }}
      frontend_needs_build: ${{ steps.detect.outputs.frontend_needs_build }}
      backend_changed: ${{ steps.detect.outputs.backend_changed }}
      backend_needs_build: ${{ steps.detect.outputs.backend_needs_build }}
      fastapi_changed: ${{ steps.detect.outputs.fastapi_changed }}
      fastapi_needs_build: ${{ steps.detect.outputs.fastapi_needs_build }}
      nginx_changed: ${{ steps.detect.outputs.nginx_changed }}
      nginx_needs_build: ${{ steps.detect.outputs.nginx_needs_build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed modules and determine build needs
        id: detect
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"
          echo ""

          # 前端检测
          FRONTEND_CHANGED="false"
          FRONTEND_NEEDS_BUILD="false"
          if echo "$CHANGED_FILES" | grep -qE "^kdx-fe/"; then
            FRONTEND_CHANGED="true"
            # 前端的依赖文件或Dockerfile变化需要构建
            if echo "$CHANGED_FILES" | grep -qE "^kdx-fe/(package\.json|package-lock\.json|Dockerfile)"; then
              FRONTEND_NEEDS_BUILD="true"
              echo "⚠️ Frontend dependencies/Dockerfile changed, will rebuild image"
            else
              echo "⚡ Frontend code changed, only need to restart"
            fi
          fi

          # 后端检测
          BACKEND_CHANGED="false"
          BACKEND_NEEDS_BUILD="false"
          if echo "$CHANGED_FILES" | grep -qE "^kdx-be/"; then
            BACKEND_CHANGED="true"
            # 后端的依赖文件或 Dockerfile 变化需要构建
            if echo "$CHANGED_FILES" | grep -qE "^kdx-be/(pyproject\.toml|uv\.lock|Dockerfile|scripts/download_insightface_models\.py)"; then
              BACKEND_NEEDS_BUILD="true"
              echo "⚠️ Backend dependencies/Dockerfile changed, will rebuild image"
            else
              echo "⚡ Backend code changed, only need to restart"
            fi
          fi

          # FastAPI 检测
          FASTAPI_CHANGED="false"
          FASTAPI_NEEDS_BUILD="false"
          if echo "$CHANGED_FILES" | grep -qE "^kdx-ws-be/"; then
            FASTAPI_CHANGED="true"
            # FastAPI 的依赖文件或 Dockerfile 变化需要构建
            if echo "$CHANGED_FILES" | grep -qE "^kdx-ws-be/(pyproject\.toml|uv\.lock|Dockerfile|scripts/download_insightface_models\.py)"; then
              FASTAPI_NEEDS_BUILD="true"
              echo "⚠️ FastAPI dependencies/Dockerfile changed, will rebuild image"
            else
              echo "⚡ FastAPI code changed, only need to restart"
            fi
          fi

          # Nginx检测
          NGINX_CHANGED="false"
          NGINX_NEEDS_BUILD="false"
          if echo "$CHANGED_FILES" | grep -qE "^compose/nginx/"; then
            NGINX_CHANGED="true"
            NGINX_NEEDS_BUILD="true"
            echo "⚠️ Nginx configuration changed, will rebuild image"
          fi

          echo ""
          echo "Detection Results:"
          echo "Frontend: changed=$FRONTEND_CHANGED, needs_build=$FRONTEND_NEEDS_BUILD"
          echo "Backend: changed=$BACKEND_CHANGED, needs_build=$BACKEND_NEEDS_BUILD"
          echo "FastAPI: changed=$FASTAPI_CHANGED, needs_build=$FASTAPI_NEEDS_BUILD"
          echo "Nginx: changed=$NGINX_CHANGED, needs_build=$NGINX_NEEDS_BUILD"

          echo "frontend_changed=$FRONTEND_CHANGED" >> $GITHUB_OUTPUT
          echo "frontend_needs_build=$FRONTEND_NEEDS_BUILD" >> $GITHUB_OUTPUT
          echo "backend_changed=$BACKEND_CHANGED" >> $GITHUB_OUTPUT
          echo "backend_needs_build=$BACKEND_NEEDS_BUILD" >> $GITHUB_OUTPUT
          echo "fastapi_changed=$FASTAPI_CHANGED" >> $GITHUB_OUTPUT
          echo "fastapi_needs_build=$FASTAPI_NEEDS_BUILD" >> $GITHUB_OUTPUT
          echo "nginx_changed=$NGINX_CHANGED" >> $GITHUB_OUTPUT
          echo "nginx_needs_build=$NGINX_NEEDS_BUILD" >> $GITHUB_OUTPUT

  build-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend_needs_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./kdx-fe
          push: true
          tags: ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/kdx-fe:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend_needs_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./kdx-be
          push: true
          tags: ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/kdx-be:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-fastapi:
    needs: detect-changes
    if: needs.detect-changes.outputs.fastapi_needs_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}

      - name: Build and push fastapi image
        uses: docker/build-push-action@v5
        with:
          context: ./kdx-ws-be
          push: true
          tags: ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/kdx-ws-be:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-nginx:
    needs: detect-changes
    if: needs.detect-changes.outputs.nginx_needs_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}

      - name: Build and push nginx image
        uses: docker/build-push-action@v5
        with:
          context: ./compose/nginx
          push: true
          tags: ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/kdx-nginx:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-ecs:
    needs: [detect-changes, build-frontend, build-backend, build-fastapi, build-nginx]
    if: |
      needs.detect-changes.outputs.frontend_changed == 'true' ||
      needs.detect-changes.outputs.backend_changed == 'true' ||
      needs.detect-changes.outputs.fastapi_changed == 'true' ||
      needs.detect-changes.outputs.nginx_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to ECS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SSH_HOST }}
          port: 22
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_KEY }}
          script: |
            set -e
            cd ${{ env.PROJECT_PATH }}
            
            echo "=== 部署开始 ==="
            
            # 拉取最新代码
            echo "拉取最新代码..."
            git fetch origin main
            git reset --hard origin/main
            
            # 登录阿里云ACR
            echo "登录阿里云ACR..."
            docker login --username=${{ env.ACR_USERNAME }} --password=${{ env.ACR_PASSWORD }} ${{ env.ACR_REGISTRY }}
            
            # 根据需要拉取镜像
            if [ "${{ needs.detect-changes.outputs.frontend_needs_build }}" = "true" ]; then
              echo "拉取前端镜像..."
              docker pull ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/kdx-fe:latest
            fi
            
            if [ "${{ needs.detect-changes.outputs.backend_needs_build }}" = "true" ]; then
              echo "拉取后端镜像..."
              docker pull ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/kdx-be:latest
            fi
            
            if [ "${{ needs.detect-changes.outputs.fastapi_needs_build }}" = "true" ]; then
              echo "拉取FastAPI镜像..."
              docker pull ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/kdx-ws-be:latest
            fi
            
            if [ "${{ needs.detect-changes.outputs.nginx_needs_build }}" = "true" ]; then
              echo "拉取Nginx镜像..."
              docker pull ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/kdx-nginx:latest
            fi
            
            # 重启服务
            echo "重启服务..."
            chmod +777 deploy.sh
            ./deploy.sh
            
            # 清理旧镜像
            echo "清理旧镜像..."
            docker image prune -f
            
            echo ""
            echo "=== 服务状态 ==="
            docker compose ps
            
            echo ""
            echo "=== 部署完成 ==="