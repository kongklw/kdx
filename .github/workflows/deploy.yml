name: Smart Deploy

on:
  push:
    branches: [main]

env:
  SSH_HOST: ${{ secrets.SSH_HOST }}
  SSH_USER: ${{ secrets.SSH_USER }}
  SSH_KEY: ${{ secrets.SSH_KEY }}
  PROJECT_PATH: /root/kdx
  DOCKER_BUILDKIT: 1

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      changed_modules: ${{ steps.detect.outputs.changed_modules }}
      backend_deps_changed: ${{ steps.detect.outputs.backend_deps_changed }}
      fastapi_deps_changed: ${{ steps.detect.outputs.fastapi_deps_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed modules and dependencies
        id: detect
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"

          MODULES=""
          BACKEND_DEPS_CHANGED="false"
          FASTAPI_DEPS_CHANGED="false"

          # 检测后端模块变化
          if echo "$CHANGED_FILES" | grep -qE "^kdx-be/"; then
            MODULES="$MODULES backend,"
            
            # 检测后端依赖文件变化（uv管理）
            if echo "$CHANGED_FILES" | grep -qE "^kdx-be/(pyproject\.toml|uv\.lock|Dockerfile|scripts/download_insightface_models\.py)"; then
              BACKEND_DEPS_CHANGED="true"
              echo "⚠️ Backend dependencies changed, will rebuild image"
            fi
          fi

          # 检测前端模块变化
          if echo "$CHANGED_FILES" | grep -qE "^kdx-fe/"; then
            MODULES="$MODULES frontend,"
          fi

          # 检测 FastAPI 模块变化
          if echo "$CHANGED_FILES" | grep -qE "^kdx-ws-be/"; then
            MODULES="$MODULES fastapi,"
            
            # 检测 FastAPI 依赖文件变化
            if echo "$CHANGED_FILES" | grep -qE "^kdx-ws-be/(pyproject\.toml|uv\.lock|Dockerfile)"; then
              FASTAPI_DEPS_CHANGED="true"
              echo "⚠️ FastAPI dependencies changed, will rebuild image"
            fi
          fi

          # 检测 Nginx/配置变化
          if echo "$CHANGED_FILES" | grep -qE "^compose/|^docker-compose\.yaml"; then
            MODULES="$MODULES nginx,"
          fi

          # 清理末尾逗号
          MODULES=$(echo "$MODULES" | sed 's/,$//')

          # 如果没有检测到变化，默认部署所有模块
          if [ -z "$MODULES" ]; then
            MODULES="backend,frontend,fastapi,nginx"
          fi

          echo "Changed modules: $MODULES"
          echo "Backend deps changed: $BACKEND_DEPS_CHANGED"
          echo "FastAPI deps changed: $FASTAPI_DEPS_CHANGED"
          
          echo "changed_modules=$MODULES" >> $GITHUB_OUTPUT
          echo "backend_deps_changed=$BACKEND_DEPS_CHANGED" >> $GITHUB_OUTPUT
          echo "fastapi_deps_changed=$FASTAPI_DEPS_CHANGED" >> $GITHUB_OUTPUT

  build-frontend:
    needs: detect-changes
    if: contains(needs.detect-changes.outputs.changed_modules, 'frontend')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: kdx-fe/package-lock.json

      - name: Install dependencies
        working-directory: kdx-fe
        run: npm ci

      - name: Build frontend
        working-directory: kdx-fe
        run: npm run build:prod

      - name: Compress dist
        working-directory: kdx-fe
        run: tar -czf dist.tar.gz dist

      - name: Upload dist to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_KEY }}
          port: 22
          source: "kdx-fe/dist.tar.gz"
          target: "${{ env.PROJECT_PATH }}/"

      - name: Extract dist on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SSH_HOST }}
          port: 22
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_KEY }}
          script: |
            cd ${{ env.PROJECT_PATH }}
            rm -rf kdx-fe/dist
            tar -xzf kdx-fe/dist.tar.gz -C kdx-fe/
            rm kdx-fe/dist.tar.gz

  deploy-backend:
    needs: detect-changes
    if: contains(needs.detect-changes.outputs.changed_modules, 'backend')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Deploy backend (with smart rebuild)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SSH_HOST }}
          port: 22
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_KEY }}
          script_timeout: 5400
          script: |
            set -e
            cd ${{ env.PROJECT_PATH }}
            git fetch origin main
            git reset --hard origin/main
            chmod +777 start.sh
            
            # 检查中间件是否运行，否则先启动
            if ! docker compose ps -q redis | grep -q . || ! docker compose ps -q db | grep -q .; then
              echo "启动中间件..."
              ./start.sh middleware
            fi
            
            # 根据依赖是否变化选择部署方式
            if [ "${{ needs.detect-changes.outputs.backend_deps_changed }}" = "true" ]; then
              echo "🔄 后端依赖变化，执行完整构建部署..."
              ./start.sh backend
            else
              echo "⚡ 后端依赖未变化，执行快速重启..."
              ./start.sh -r backend
            fi

  deploy-fastapi:
    needs: detect-changes
    if: contains(needs.detect-changes.outputs.changed_modules, 'fastapi')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Deploy FastAPI (with smart rebuild)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SSH_HOST }}
          port: 22
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_KEY }}
          script_timeout: 5400
          script: |
            set -e
            cd ${{ env.PROJECT_PATH }}
            git fetch origin main
            git reset --hard origin/main
            chmod +777 start.sh
            
            # 检查中间件是否运行，否则先启动
            if ! docker compose ps -q redis | grep -q .; then
              echo "启动 Redis..."
              docker compose up -d redis
            fi
            
            # 根据依赖是否变化选择部署方式
            if [ "${{ needs.detect-changes.outputs.fastapi_deps_changed }}" = "true" ]; then
              echo "🔄 FastAPI 依赖变化，执行完整构建部署..."
              ./start.sh fastapi
            else
              echo "⚡ FastAPI 依赖未变化，执行快速重启..."
              ./start.sh -r fastapi
            fi

  deploy-nginx:
    needs: [detect-changes, build-frontend]
    if: contains(needs.detect-changes.outputs.changed_modules, 'frontend') || contains(needs.detect-changes.outputs.changed_modules, 'nginx')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SSH_HOST }}
          port: 22
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_KEY }}
          script: |
            set -e
            cd ${{ env.PROJECT_PATH }}
            git fetch origin main
            git reset --hard origin/main
            chmod +777 start.sh
            ./start.sh nginx
            echo "=== 服务状态 ==="
            docker compose ps