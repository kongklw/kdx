name: Smart Deploy

on:
  push:
    branches: [main]

env:
  SSH_HOST: ${{ secrets.SSH_HOST }}
  SSH_USER: ${{ secrets.SSH_USER }}
  SSH_KEY: ${{ secrets.SSH_KEY }}
  PROJECT_PATH: /root/kdx

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      changed_modules: ${{ steps.detect.outputs.changed_modules }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed modules
        id: detect
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"

          MODULES=""

          if echo "$CHANGED_FILES" | grep -qE "^kdx-be/"; then
            MODULES="$MODULES backend,"
          fi

          if echo "$CHANGED_FILES" | grep -qE "^kdx-fe/"; then
            MODULES="$MODULES frontend,"
          fi

          if echo "$CHANGED_FILES" | grep -qE "^kdx-ws-be/"; then
            MODULES="$MODULES fastapi,"
          fi

          if echo "$CHANGED_FILES" | grep -qE "^compose/|^docker-compose\.yaml"; then
            MODULES="$MODULES nginx,"
          fi

          MODULES=$(echo "$MODULES" | sed 's/,$//')

          if [ -z "$MODULES" ]; then
            MODULES="backend,frontend,fastapi,nginx"
          fi

          echo "Changed modules: $MODULES"
          echo "changed_modules=$MODULES" >> $GITHUB_OUTPUT

  build-frontend:
    needs: detect-changes
    if: contains(needs.detect-changes.outputs.changed_modules, 'frontend')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: kdx-fe
        run: npm ci

      - name: Build frontend
        working-directory: kdx-fe
        run: npm run build:prod

      - name: Upload dist to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_KEY }}
          port: 22
          source: "kdx-fe/dist"
          target: "${{ env.PROJECT_PATH }}/kdx-fe/"

  deploy-backend:
    needs: detect-changes
    if: contains(needs.detect-changes.outputs.changed_modules, 'backend')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SSH_HOST }}
          port: 22
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_KEY }}
          script: |
            set -e
            cd ${{ env.PROJECT_PATH }}
            git fetch origin main
            git reset --hard origin/main
            chmod +777 start.sh
            ./start.sh backend

  deploy-fastapi:
    needs: detect-changes
    if: contains(needs.detect-changes.outputs.changed_modules, 'fastapi')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy FastAPI
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SSH_HOST }}
          port: 22
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_KEY }}
          script: |
            set -e
            cd ${{ env.PROJECT_PATH }}
            git fetch origin main
            git reset --hard origin/main
            chmod +777 start.sh
            ./start.sh fastapi

  deploy-nginx:
    needs: [detect-changes, build-frontend]
    if: contains(needs.detect-changes.outputs.changed_modules, 'frontend') || contains(needs.detect-changes.outputs.changed_modules, 'nginx')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SSH_HOST }}
          port: 22
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_KEY }}
          script: |
            set -e
            cd ${{ env.PROJECT_PATH }}
            git fetch origin main
            git reset --hard origin/main
            chmod +777 start.sh
            ./start.sh nginx
            echo "=== 服务状态 ==="
            docker compose ps