# nginx配置文件
# compose/nginx/default.conf

# 动态 resolver（Docker DNS）
resolver 127.0.0.11 valid=30s ipv6=off;

upstream django {
    server web:8000;
}

upstream fastapi_app {
    server kdx_ws:8001;
}

# HTTP 配置
server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    charset utf-8;
    client_max_body_size 100M;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        if ($request_filename ~* ^.*?\.(html|htm)$) {
            add_header Cache-Control "private, no-store, no-cache, must-revalidate, proxy-revalidate";
        }
    }

    location /prod-api/media {
         alias /usr/share/nginx/html/media;
    }

    # 使用变量方式配置代理，延迟 DNS 解析
    location /prod-ai/ {
        set $upstream_fastapi kdx_ws:8001;
        proxy_pass http://$upstream_fastapi/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;
        proxy_set_header X-Real-IP  $remote_addr;
    }

    location /prod-ai/ws/ {
        set $upstream_fastapi kdx_ws:8001;
        proxy_pass http://$upstream_fastapi/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    location /prod-api/ {
        proxy_pass http://web:8000/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;
        proxy_set_header X-Real-IP  $remote_addr;
    }

    location /milvus {
        proxy_pass http://127.0.0.1:9091/webui;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;
        proxy_set_header X-Real-IP  $remote_addr;
    }

    error_page 404 /404.html;
        location = /40x.html {
    }

    error_page 500 502 503 504 /50x.html;
        location = /50x.html {
    }
}

# HTTPS 配置
server {
    listen       443 ssl;
    listen       [::]:443 ssl;
    server_name  _;

    ssl_certificate /usr/share/nginx/ssl/cert.pem;
    ssl_certificate_key /usr/share/nginx/ssl/key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:1m;
    ssl_session_timeout 5m;

    charset utf-8;
    client_max_body_size 100M;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

