# nginx配置文件
# compose/nginx/default.conf

upstream django {
    ip_hash;
    server web:8000; # Docker-compose web服务端口
}

upstream fastapi_app {
    server kdx_ws:8001;
}

# HTTP 重定向到 HTTPS
server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    # 重定向所有 HTTP 请求到 HTTPS
    return 301 https://$host$request_uri;
}

# HTTPS 配置
server {
    listen       443 ssl;
    listen       [::]:443 ssl;
    server_name  _;

    # SSL 证书配置
    ssl_certificate /usr/share/nginx/ssl/cert.pem;
    ssl_certificate_key /usr/share/nginx/ssl/key.pem;

    # SSL 优化配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:1m;
    ssl_session_timeout 5m;

    charset utf-8;
    client_max_body_size 100M; # 限制用户上传文件大小

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        # Disable cache for index.html
        if ($request_filename ~* ^.*?\.(html|htm)$) {
            add_header Cache-Control "private, no-store, no-cache, must-revalidate, proxy-revalidate";
        }
    }

    location /prod-api/media {
         alias /usr/share/nginx/html/media;
    }

    location /prod-ai/ {
        proxy_pass http://fastapi_app/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;
        proxy_set_header X-Real-IP  $remote_addr;
    }

    location /prod-ai/ws/ {
        proxy_pass http://fastapi_app/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    location /prod-api/ {
        proxy_pass http://web:8000/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;
        proxy_set_header X-Real-IP  $remote_addr;
    }

    location /milvus {
        proxy_pass http://127.0.0.1:9091/webui;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;
        proxy_set_header X-Real-IP  $remote_addr;
    }

    error_page 404 /404.html;
        location = /40x.html {
    }

    error_page 500 502 503 504 /50x.html;
        location = /50x.html {
    }
}